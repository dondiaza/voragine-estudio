name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend-vg/package-lock.json
            voragine/package-lock.json

      - name: Install backend
        working-directory: backend-vg
        run: npm ci

      - name: Backend sanity check
        working-directory: backend-vg
        run: node -e "require('./server'); console.log('backend ok')"
        env:
          JWT_SECRET: test-secret
          CORS_ORIGINS: http://localhost:3000

      - name: Install frontend
        working-directory: voragine
        run: npm ci

      - name: Build frontend
        working-directory: voragine
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
          CMS_API_URL: http://localhost:5000/api
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          REVALIDATE_TOKEN: ci-token
